included:
  - .
excluded:
  - Carthage
  - Pods
  - .build
  - DerivedData
  - fastlane
  - Scripts

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_parameter_alignment_on_call

disabled_rules:
  - todo

analyzer_rules:
  - unused_declaration
  - unused_import

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 80

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length:
    warning: 2
  excluded:
    - i
    - j
    - x
    - y
    - id
    - vc

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 2

trailing_whitespace:
  ignores_empty_lines: true

reporter: "xcode"